version: "3.9"

services:

  qdrant-node1:
    image: qdrant/qdrant:v1.13.4
    container_name: qdrant-node1
    restart: unless-stopped

    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
      - "6335:6335"   # cluster P2P

    volumes:
      - ./data/node1:/qdrant/storage

    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__P2P__PORT: "6335"
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"

    command:
      - "./qdrant"
      - "--uri"
      - "http://qdrant-node1:6335"


  qdrant-node2:
    image: qdrant/qdrant:v1.13.4
    container_name: qdrant-node2
    restart: unless-stopped

    depends_on:
      - qdrant-node1

    volumes:
      - ./data/node2:/qdrant/storage

    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__P2P__PORT: "6335"
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"

    command:
      - "./qdrant"
      - "--bootstrap"
      - "http://qdrant-node1:6335"
      - "--uri"
      - "http://qdrant-node2:6335"


  qdrant-node3:
    image: qdrant/qdrant:v1.13.4
    container_name: qdrant-node3
    restart: unless-stopped

    depends_on:
      - qdrant-node1

    volumes:
      - ./data/node3:/qdrant/storage

    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__P2P__PORT: "6335"
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"

    command:
      - "./qdrant"
      - "--bootstrap"
      - "http://qdrant-node1:6335"
      - "--uri"
      - "http://qdrant-node3:6335"


networks:
  default:
    name: qdrant-net